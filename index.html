<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的小世界</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        love: {
                            50: '#fdf2f8',
                            100: '#fce7f3',
                            200: '#fbcfe8',
                            300: '#f9a8d4',
                            400: '#f472b6',
                            500: '#ec4899',
                            600: '#db2777',
                            700: '#be185d',
                            800: '#9d174d',
                            900: '#831843',
                        }
                    },
                    fontFamily: {
                        love: ['Segoe UI', 'Roboto', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .heart-fall {
                position: fixed;
                top: -10px;
                animation: fall linear forwards;
                pointer-events: none;
                z-index: 1;
            }
            @keyframes fall {
                to {
                    transform: translateY(100vh) rotate(720deg);
                    opacity: 0;
                }
            }
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-5px);
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            }
            .photo-item {
                transition: all 0.3s ease;
            }
            .photo-item:hover {
                transform: scale(1.05);
                z-index: 10;
            }
        }
    </style>
</head>
<body class="font-love min-h-screen bg-cover bg-center bg-fixed" style="background-image: url('https://aka.doubaocdn.com/s/wi5h1w5foi');">
    <!-- 半透明遮罩 -->
    <div class="fixed inset-0 bg-black/30 z-0"></div>

    <!-- 爱心飘落容器 -->
    <div id="hearts-container" class="fixed inset-0 overflow-hidden pointer-events-none z-10"></div>

    <div class="relative z-20 container mx-auto px-4 py-8 max-w-5xl">
        <!-- 标题 -->
        <header class="text-center mb-10">
            <h1 class="text-[clamp(2rem,5vw,3.5rem)] font-bold text-white drop-shadow-lg mb-2">
                <i class="fa fa-heart text-love-400 animate-pulse"></i> 我们的小世界
            </h1>
            <p class="text-white/80 text-lg">记录我们的每一个美好瞬间</p>
            <p id="share-tip" class="text-white/60 text-sm mt-2 hidden">分享此链接给TA，就能一起编辑啦~</p>
        </header>

        <!-- 加载提示 -->
        <div id="loading" class="text-center text-white py-20">
            <i class="fa fa-spinner fa-spin text-3xl mb-4"></i>
            <p>加载中...</p>
        </div>

        <!-- 主内容 -->
        <div id="main-content" class="hidden space-y-8">
            <!-- 时光相册 -->
            <section class="bg-white/90 backdrop-blur-sm rounded-2xl p-6 shadow-xl card-hover">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-bold text-gray-800">
                        <i class="fa fa-camera text-love-500"></i> 时光相册
                    </h2>
                    <!-- 小的上传按钮 -->
                    <button id="upload-btn" class="bg-love-500 hover:bg-love-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm transition-all">
                        <i class="fa fa-plus"></i>
                    </button>
                </div>

                <!-- 照片网格 -->
                <div id="photos-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                    <!-- 照片会动态加载在这里 -->
                </div>

                <!-- 空状态 -->
                <div id="photos-empty" class="text-center py-10 text-gray-500">
                    <i class="fa fa-picture-o text-4xl mb-2"></i>
                    <p>还没有照片，点击右上角的加号添加我们的回忆吧~</p>
                </div>
            </section>

            <!-- 备忘录 -->
            <section class="bg-white/90 backdrop-blur-sm rounded-2xl p-6 shadow-xl card-hover">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">
                    <i class="fa fa-sticky-note text-love-500"></i> 备忘录
                </h2>
                <textarea id="memo-input" class="w-full h-40 p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-love-500 focus:border-transparent outline-none resize-none transition-all" placeholder="写下我们的小秘密，想说的话，或者要做的事..."></textarea>
                <p class="text-right text-gray-400 text-sm mt-2">内容会自动保存到云端</p>
            </section>

            <!-- 星愿墙 -->
            <section class="bg-white/90 backdrop-blur-sm rounded-2xl p-6 shadow-xl card-hover">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">
                    <i class="fa fa-star text-love-500"></i> 我们的星愿墙
                </h2>

                <!-- 添加星愿 -->
                <div class="flex gap-2 mb-4">
                    <input type="text" id="wish-input" class="flex-1 p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-love-500 focus:border-transparent outline-none transition-all" placeholder="添加一个我们一起要完成的小愿望...">
                    <button id="add-wish-btn" class="bg-love-500 hover:bg-love-600 text-white px-4 py-2 rounded-xl transition-all">
                        <i class="fa fa-plus"></i> 添加
                    </button>
                </div>

                <!-- 星愿列表 -->
                <div id="wishes-list" class="space-y-2">
                    <!-- 星愿会动态加载在这里 -->
                </div>

                <!-- 空状态 -->
                <div id="wishes-empty" class="text-center py-6 text-gray-500">
                    <i class="fa fa-star-o text-4xl mb-2"></i>
                    <p>还没有星愿，添加一个我们一起去实现吧~</p>
                </div>
            </section>
        </div>
    </div>

    <!-- 上传照片弹窗 -->
    <div id="upload-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md">
            <h3 class="text-xl font-bold text-gray-800 mb-4">添加新照片</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-700 mb-2">选择照片</label>
                    <input type="file" id="photo-file" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-love-50 file:text-love-700 hover:file:bg-love-100">
                </div>

                <div>
                    <label class="block text-gray-700 mb-2">照片日期</label>
                    <input type="date" id="photo-date" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-love-500 focus:border-transparent outline-none">
                </div>

                <div class="flex gap-2 justify-end mt-6">
                    <button id="cancel-upload" class="px-4 py-2 border border-gray-300 rounded-xl text-gray-700 hover:bg-gray-100 transition-all">取消</button>
                    <button id="confirm-upload" class="px-4 py-2 bg-love-500 text-white rounded-xl hover:bg-love-600 transition-all">确认上传</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 照片预览弹窗 -->
    <div id="photo-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center p-4" onclick="closePhotoModal()">
        <img id="photo-modal-img" class="max-w-full max-h-full rounded-lg" alt="照片预览">
    </div>

    <!-- 提示消息 -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg z-50 hidden transition-all">
        <span id="toast-text"></span>
    </div>

    <script>
        // 全局变量
        let storageKey = null;
        // 国内可访问的存储服务
        let apiBase = 'https://json.minicg.com/api';
        let appData = {
            photos: [],
            memo: '',
            wishes: []
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', init);

        async function init() {
            // 从URL获取key
            const urlParams = new URLSearchParams(window.location.search);
            storageKey = urlParams.get('key');

            if (storageKey) {
                // 有key，加载数据
                await loadData();
                document.getElementById('share-tip').classList.remove('hidden');
            } else {
                // 没有key，创建新的存储
                await createNewStorage();
            }

            // 隐藏加载，显示内容
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');

            // 初始化事件监听
            initEventListeners();

            // 启动爱心飘落效果
            startHeartFall();
        }

        // 创建新的存储
        async function createNewStorage() {
            try {
                const response = await fetch(apiBase, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(appData)
                });

                const result = await response.json();
                // 解析uri，得到key
                const uri = result.uri;
                // uri格式: https://json.minicg.com/api/xxx
                const key = uri.replace(apiBase + '/', '');
                storageKey = key;

                // 更新URL，添加key参数
                window.history.replaceState({}, '', `${window.location.pathname}?key=${storageKey}`);
                document.getElementById('share-tip').classList.remove('hidden');

                showToast('创建成功，分享链接给TA一起编辑吧~');
            } catch (error) {
                console.error('创建存储失败:', error);
                showToast('创建失败，请刷新重试');
            }
        }

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch(`${apiBase}/${storageKey}`);
                if (response.ok) {
                    const data = await response.json();
                    appData = data || appData;
                }
                // 渲染数据
                renderPhotos();
                renderMemo();
                renderWishes();
            } catch (error) {
                console.error('加载数据失败:', error);
                showToast('加载数据失败，请刷新重试');
            }
        }

        // 保存数据
        async function saveData() {
            try {
                await fetch(`${apiBase}/${storageKey}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(appData)
                });
                return true;
            } catch (error) {
                console.error('保存数据失败:', error);
                showToast('保存失败，请稍后再试');
                return false;
            }
        }

        // 初始化事件监听
        function initEventListeners() {
            // 上传按钮
            document.getElementById('upload-btn').addEventListener('click', openUploadModal);
            document.getElementById('cancel-upload').addEventListener('click', closeUploadModal);
            document.getElementById('confirm-upload').addEventListener('click', handleUploadPhoto);

            // 备忘录
            document.getElementById('memo-input').addEventListener('input', (e) => {
                appData.memo = e.target.value;
                debounce(saveData, 500)();
            });

            // 星愿
            document.getElementById('add-wish-btn').addEventListener('click', addWish);
            document.getElementById('wish-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addWish();
            });
        }

        // 打开上传弹窗
        function openUploadModal() {
            // 设置默认日期为今天
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('photo-date').value = today;
            document.getElementById('photo-file').value = '';
            document.getElementById('upload-modal').classList.remove('hidden');
        }

        // 关闭上传弹窗
        function closeUploadModal() {
            document.getElementById('upload-modal').classList.add('hidden');
        }

        // 处理照片上传
        async function handleUploadPhoto() {
            const fileInput = document.getElementById('photo-file');
            const dateInput = document.getElementById('photo-date');

            if (!fileInput.files || fileInput.files.length === 0) {
                showToast('请选择一张照片');
                return;
            }

            if (!dateInput.value) {
                showToast('请选择照片日期');
                return;
            }

            const file = fileInput.files[0];
            if (!file.type.startsWith('image/')) {
                showToast('请选择图片文件');
                return;
            }

            showToast('正在处理照片...');

            try {
                // 压缩图片
                const base64 = await compressImage(file);
                
                // 添加到数据
                appData.photos.push({
                    src: base64,
                    date: dateInput.value,
                    id: Date.now()
                });

                // 按日期排序
                appData.photos.sort((a, b) => new Date(b.date) - new Date(a.date));

                // 保存
                await saveData();
                // 重新渲染
                renderPhotos();
                // 关闭弹窗
                closeUploadModal();
                showToast('照片添加成功~');
            } catch (error) {
                console.error('处理照片失败:', error);
                showToast('处理照片失败，请重试');
            }
        }

        // 图片压缩函数
        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        // 压缩尺寸，最大宽度800px
                        let width = img.width;
                        let height = img.height;
                        const maxWidth = 800;
                        if (width > maxWidth) {
                            height = height * (maxWidth / width);
                            width = maxWidth;
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // 压缩质量，确保base64大小小于32KB
                        let quality = 0.7;
                        let result = canvas.toDataURL('image/jpeg', quality);
                        
                        // 如果还是太大，继续降低质量
                        while (result.length > 32000 && quality > 0.1) {
                            quality -= 0.1;
                            result = canvas.toDataURL('image/jpeg', quality);
                        }

                        resolve(result);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // 渲染照片
        function renderPhotos() {
            const grid = document.getElementById('photos-grid');
            const empty = document.getElementById('photos-empty');

            if (appData.photos.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.innerHTML = appData.photos.map(photo => `
                <div class="photo-item rounded-xl overflow-hidden shadow-md cursor-pointer" onclick="openPhotoModal('${photo.src.replace(/'/g, "\\'")}')">
                    <img src="${photo.src}" alt="照片" class="w-full h-40 object-cover">
                    <div class="bg-black/50 text-white text-xs p-1 text-center">
                        ${photo.date}
                    </div>
                </div>
            `).join('');
        }

        // 打开照片预览
        function openPhotoModal(src) {
            document.getElementById('photo-modal-img').src = src;
            document.getElementById('photo-modal').classList.remove('hidden');
        }

        // 关闭照片预览
        function closePhotoModal() {
            document.getElementById('photo-modal').classList.add('hidden');
        }

        // 渲染备忘录
        function renderMemo() {
            document.getElementById('memo-input').value = appData.memo;
        }

        // 添加星愿
        async function addWish() {
            const input = document.getElementById('wish-input');
            const text = input.value.trim();

            if (!text) {
                showToast('请输入星愿内容');
                return;
            }

            appData.wishes.push({
                id: Date.now(),
                text: text,
                completed: false
            });

            input.value = '';
            await saveData();
            renderWishes();
            showToast('星愿添加成功~');
        }

        // 切换星愿完成状态
        async function toggleWish(id) {
            const wish = appData.wishes.find(w => w.id === id);
            if (wish) {
                wish.completed = !wish.completed;
                await saveData();
                renderWishes();
            }
        }

        // 删除星愿
        async function deleteWish(id, e) {
            e.stopPropagation();
            appData.wishes = appData.wishes.filter(w => w.id !== id);
            await saveData();
            renderWishes();
            showToast('星愿已删除');
        }

        // 渲染星愿
        function renderWishes() {
            const list = document.getElementById('wishes-list');
            const empty = document.getElementById('wishes-empty');

            if (appData.wishes.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            list.innerHTML = appData.wishes.map(wish => `
                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl group">
                    <input type="checkbox" ${wish.completed ? 'checked' : ''} 
                        onchange="toggleWish(${wish.id})"
                        class="w-5 h-5 rounded border-gray-300 text-love-500 focus:ring-love-500">
                    <span class="flex-1 ${wish.completed ? 'line-through text-gray-400' : 'text-gray-700'}">${wish.text}</span>
                    <button onclick="deleteWish(${wish.id}, event)" class="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 transition-all">
                        <i class="fa fa-trash-o"></i>
                    </button>
                </div>
            `).join('');
        }

        // 爱心飘落效果
        function startHeartFall() {
            setInterval(() => {
                createHeart();
            }, 500);
        }

        function createHeart() {
            const container = document.getElementById('hearts-container');
            const heart = document.createElement('div');
            heart.className = 'heart-fall text-love-400';
            heart.innerHTML = ['❤️', '💕', '💗', '💖'][Math.floor(Math.random() * 4)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 15 + 10) + 'px';
            heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
            container.appendChild(heart);

            // 动画结束后移除
            setTimeout(() => {
                heart.remove();
            }, 10000);
        }

        // 防抖函数
        function debounce(func, wait) {
            let timeout;
            return function() {
                const context = this;
                const args = arguments;
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(context, args), wait);
            };
        }

        // 显示提示
        function showToast(text) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            toastText.textContent = text;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 2500);
        }
    </script>
</body>
</html>
